name: Deploy WhiteBoardDefense

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .env from secrets
        run: |
          cat > .env << EOF
          AI_PROVIDER=${{ secrets.AI_PROVIDER }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_MODEL=${{ secrets.CLAUDE_MODEL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}
          PORT=${{ secrets.PORT }}
          NODE_ENV=${{ secrets.NODE_ENV }}
          APP_URL=${{ secrets.APP_URL }}
          APP_SECRET=${{ secrets.APP_SECRET }}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Replace this step with however you currently get files to the server
      # (SCP, robocopy over VPN, xcopy, etc.)
      - name: Copy to server
        run: echo "Add your deployment step here"